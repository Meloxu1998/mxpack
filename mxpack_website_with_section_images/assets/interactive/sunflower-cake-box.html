<script>
(function(){
  var cake=document.getElementById('cake');
  var N=12,R=100,segW=54,segH=78,html='';
  for(var k=0;k<N;k++){
    html+='<div style="position:absolute;left:-27px;top:-39px;width:'+segW+'px;height:'+segH+'px;backface-visibility:hidden;background:#F7E3A6;transform:rotateY('+(k*30)+'deg) translateZ('+R+'px);">'
        +'<div style="position:absolute;left:0;right:0;top:0;height:18px;background:#FFE24A;border-radius:0 0 11px 11px;"></div></div>';
  }
  html+='<div style="position:absolute;left:-100px;top:-100px;width:200px;height:200px;border-radius:50%;backface-visibility:hidden;background:#FFE24A;transform:rotateX(90deg) translateZ(39px);">'
      +'<svg viewBox="0 0 200 200" style="position:absolute;inset:0;width:100%;height:100%;" aria-hidden="true">'
      +'<circle cx="100" cy="100" r="66" fill="none" stroke="#F5CE1F" stroke-width="3.5"/>'
      +'<circle cx="100" cy="100" r="44" fill="none" stroke="#F5CE1F" stroke-width="3.5"/>'
      +'<circle cx="100" cy="100" r="22" fill="none" stroke="#F5CE1F" stroke-width="3.5"/>'
      +'<defs><g id="dz"><ellipse cx="0" cy="-9" rx="4.5" ry="9" fill="#FFFFFF"/><ellipse cx="8" cy="-4.5" rx="4.5" ry="9" fill="#FFFFFF" transform="rotate(60)"/><ellipse cx="8" cy="4.5" rx="4.5" ry="9" fill="#FFFFFF" transform="rotate(120)"/><ellipse cx="0" cy="9" rx="4.5" ry="9" fill="#FFFFFF" transform="rotate(180)"/><ellipse cx="-8" cy="4.5" rx="4.5" ry="9" fill="#FFFFFF" transform="rotate(240)"/><ellipse cx="-8" cy="-4.5" rx="4.5" ry="9" fill="#FFFFFF" transform="rotate(300)"/><circle r="5" fill="#F6C21C"/></g></defs>';
  for(var a=0;a<8;a++){
    var rad=a*Math.PI/4, dx=100+Math.cos(rad)*75, dy=100+Math.sin(rad)*75;
    html+='<use href="#dz" transform="translate('+dx.toFixed(1)+' '+dy.toFixed(1)+')"/>';
  }
  html+='<g><circle cx="124" cy="66" r="24" fill="#FCE85A" stroke="#FFFFFF" stroke-width="3.5"/><g stroke="#FFFFFF" stroke-width="2.5"><line x1="124" y1="45" x2="124" y2="87"/><line x1="103" y1="66" x2="145" y2="66"/><line x1="109" y1="51" x2="139" y2="81"/><line x1="139" y1="51" x2="109" y2="81"/></g>'
      +'<circle cx="150" cy="84" r="19" fill="#FCE85A" stroke="#FFFFFF" stroke-width="3.5"/><g stroke="#FFFFFF" stroke-width="2.5"><line x1="150" y1="67" x2="150" y2="101"/><line x1="133" y1="84" x2="167" y2="84"/></g></g></svg></div>';
  cake.innerHTML=html;

  var stage=document.getElementById('stage'),box=document.getElementById('box'),hinge=document.getElementById('hinge');
  var yaw=-32,pitch=-24,dragging=false,lx=0,ly=0,idle=0;
  var lid=0,lidTarget=0,phase=0,timer=0;
  var HOLD_CLOSED=170,HOLD_OPEN=240;
  function loop(){
    if(!dragging){ if(idle>0){idle--;} else {yaw+=0.3;} }
    timer++;
    if(phase===0&&timer>HOLD_CLOSED){phase=1;lidTarget=112;timer=0;}
    else if(phase===1&&timer>HOLD_OPEN){phase=0;lidTarget=0;timer=0;}
    lid+=(lidTarget-lid)*0.055;
    box.style.transform='translateY(16px) rotateX('+pitch+'deg) rotateY('+yaw+'deg)';
    hinge.style.transform='translateZ(-125px) rotateX('+lid+'deg)';
    requestAnimationFrame(loop);
  }
  stage.addEventListener('pointerdown',function(e){dragging=true;lx=e.clientX;ly=e.clientY;stage.style.cursor='grabbing';stage.setPointerCapture(e.pointerId);});
  stage.addEventListener('pointermove',function(e){
    if(!dragging)return;
    yaw+=(e.clientX-lx)*0.4;
    pitch-=(e.clientY-ly)*0.3;
    if(pitch>12)pitch=12; if(pitch<-72)pitch=-72;
    lx=e.clientX;ly=e.clientY;
  });
  function up(){dragging=false;idle=150;stage.style.cursor='grab';}
  stage.addEventListener('pointerup',up);
  stage.addEventListener('pointercancel',up);
  loop();
})();
</script>
